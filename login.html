<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة تعلم الإنجليزية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header>
        <nav>
            <div class="logo">📚 English Platform</div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="register.html" class="btn-register">إنشاء حساب</a></li>
            </ul>
            <div class="hamburger" id="hamburger">☰</div>
        </nav>
    </header>

    <!-- ===== LOGIN FORM ===== -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>🔐 تسجيل الدخول</h2>
            
            <div id="errorMsg" class="error-msg" style="display:none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label>🔑 كلمة المرور</label>
                    <input type="password" id="loginPassword" required placeholder="********" minlength="6">
                </div>
                
                <div class="form-options">
                    <label><input type="checkbox" id="rememberMe"> تذكرني</label>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>
                
                <button type="submit" class="btn-submit">🚀 تسجيل الدخول</button>
            </form>
            
            <div class="auth-links">
                <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
                <a href="index.html" class="back-home">🏠 العودة للرئيسية</a>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 منصة تعلم الإنجليزية - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
