<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة تعلم الإنجليزية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header>
        <nav>
            <div class="logo">📚 English Platform</div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="login.html" class="btn-login">تسجيل دخول</a></li>
            </ul>
            <div class="hamburger" id="hamburger">☰</div>
        </nav>
    </header>

    <!-- ===== REGISTER FORM ===== -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>📝 إنشاء حساب جديد</h2>
            
            <div id="errorMsg" class="error-msg" style="display:none;"></div>
            <div id="successMsg" class="success-msg" style="display:none;"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="regUsername" required placeholder="أحمد محمد" minlength="3">
                </div>
                
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="regEmail" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label>🔑 كلمة المرور</label>
                    <input type="password" id="regPassword" required placeholder="********" minlength="6">
                    <small class="password-hint">يجب أن تكون 6 أحرف على الأقل</small>
                </div>
                
                <div class="form-group">
                    <label>✅ تأكيد كلمة المرور</label>
                    <input type="password" id="regConfirmPassword" required placeholder="********" minlength="6">
                </div>
                
                <div class="form-options">
                    <label><input type="checkbox" id="agreeTerms" required> أوافق على <a href="#">الشروط والأحكام</a></label>
                </div>
                
                <button type="submit" class="btn-submit">🎉 إنشاء حساب</button>
            </form>
            
            <div class="auth-links">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل دخول</a></p>
                <a href="index.html" class="back-home">🏠 العودة للرئيسية</a>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 منصة تعلم الإنجليزية - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
